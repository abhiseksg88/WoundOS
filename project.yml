name: WoundOS
options:
  bundleIdPrefix: com.careplix
  deploymentTarget:
    iOS: "16.0"
  xcodeVersion: "15.0"
  developmentLanguage: en

settings:
  base:
    SWIFT_VERSION: "5.9"
    TARGETED_DEVICE_FAMILY: "1"  # iPhone only
    ARCHS: arm64
    ONLY_ACTIVE_ARCH: "YES"
    SUPPORTS_MAC_DESIGNED_FOR_IPHONE_IPAD: "NO"

targets:
  WoundOS:
    type: application
    platform: iOS
    deploymentTarget: "16.0"
    sources:
      - path: WoundOS
        excludes:
          - "**/.DS_Store"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.careplix.woundos
        INFOPLIST_FILE: WoundOS/Resources/Info.plist
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: ""  # Add your team ID here
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ENABLE_PREVIEWS: "YES"
    info:
      path: WoundOS/Resources/Info.plist
      properties:
        NSCameraUsageDescription: "WoundOS needs camera access to capture wound images for measurement using LiDAR 3D scanning."
        NSPhotoLibraryUsageDescription: "WoundOS needs photo library access to save wound measurement reports."
        UIRequiredDeviceCapabilities:
          - arkit
          - arm64
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait

  WoundOSTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "16.0"
    sources:
      - path: WoundOSTests
    dependencies:
      - target: WoundOS
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.careplix.woundos.tests
